# ── Terminal & Colors ─────────────────────────────────────────────
# True color support (needed for nvim themes to render correctly)
set -g default-terminal "tmux-256color"
set-option -sa terminal-overrides ",xterm*:Tc"
# Undercurl support (needed for nvim LSP diagnostics: wavy underlines)
set -as terminal-overrides ',*:Smulx=\E[4::%p1%dm'
# Underscore colors (needed for nvim diagnostics colored underlines)
set -as terminal-overrides ',*:Setulc=\E[58::2::%p1%{65536}%/%d::%p1%{256}%/%{255}%&%d::%p1%{255}%&%d%;m'

# ── General ──────────────────────────────────────────────────────
set -g mouse on
set -gq allow-passthrough on

# Prefix key
unbind C-b
set -g prefix C-Space
bind C-Space send-prefix

# ── Nvim Integration ─────────────────────────────────────────────
# Fast escape (default 500ms causes delay when pressing Esc in nvim)
set -sg escape-time 0
# Focus events (nvim autoread detects file changes when switching panes)
set-option -g focus-events on
# Longer scrollback (nvim terminal and log viewing)
set -g history-limit 50000
# Match nvim updatetime
set -g display-time 1000

# ── Windows & Panes ──────────────────────────────────────────────
# Start at 1, not 0
set -g base-index 1
set -g pane-base-index 1
set-option -g renumber-windows on
# Don't let terminal title overwrite window name
set-option -g set-titles off

# Vim style pane selection
bind h select-pane -L
bind j select-pane -D
bind k select-pane -U
bind l select-pane -R

# Alt-arrow keys to switch panes (no prefix)
bind -n M-Left select-pane -L
bind -n M-Right select-pane -R
bind -n M-Up select-pane -U
bind -n M-Down select-pane -D

# Shift arrow to switch windows
bind -n S-Left  previous-window
bind -n S-Right next-window

# Shift Alt vim keys to switch windows
bind -n M-H previous-window
bind -n M-L next-window

# Splits (keep current path)
bind '"' split-window -v -c "#{pane_current_path}"
bind % split-window -h -c "#{pane_current_path}"

# Vim-style splits (matching nvim <leader>v and <leader>h)
bind v split-window -h -c "#{pane_current_path}"
bind s split-window -v -c "#{pane_current_path}"

# Resize panes with vim keys (matching nvim arrow resize)
bind -r C-h resize-pane -L 5
bind -r C-j resize-pane -D 5
bind -r C-k resize-pane -U 5
bind -r C-l resize-pane -R 5

# ── Copy Mode (vi style, matching nvim) ──────────────────────────
set-window-option -g mode-keys vi
bind-key -T copy-mode-vi v send-keys -X begin-selection
bind-key -T copy-mode-vi C-v send-keys -X rectangle-toggle
bind-key -T copy-mode-vi y send-keys -X copy-selection-and-cancel
set -g @yank_selection 'clipboard'
set -g @yank_selection_mouse 'clipboard'
# Auto-detect clipboard: Wayland → wl-copy, X11 → xclip
if-shell '[ -n "$WAYLAND_DISPLAY" ]' \
    'set -g @override_copy_command "wl-copy"' \
    'set -g @override_copy_command "xclip -selection clipboard"'

# ── Reload ───────────────────────────────────────────────────────
bind r source-file ~/.config/tmux/tmux.conf \; display-message "Reloaded!"

# ── Plugins ──────────────────────────────────────────────────────
set -g @plugin 'tmux-plugins/tpm'
set -g @plugin 'tmux-plugins/tmux-sensible'
set -g @plugin 'christoomey/vim-tmux-navigator'
set -g @plugin 'catppuccin/tmux'
set -g @plugin 'tmux-plugins/tmux-yank'
set -g @plugin 'tmux-plugins/tmux-resurrect'
set -g @plugin 'tmux-plugins/tmux-continuum'
# Resurrect: prefix + Ctrl+s (save session), prefix + Ctrl+r (restore session)
# Save and restore pane contents
set -g @resurrect-capture-pane-contents 'on'
# Continuum: auto-save every 15 min + auto-restore on tmux start
set -g @continuum-restore 'on'
set -g @continuum-save-interval '15'

# ── Theme Config (Catppuccin) ────────────────────────────────────
set -g @catppuccin_flavor 'mocha' # latte, frappe, macchiato, mocha
set -g @catppuccin_window_status_style 'rounded'
set -g @catppuccin_window_text ' #W'
set -g @catppuccin_window_current_text ' #W'
set -g @catppuccin_status_connect_separator 'no'
set -g @catppuccin_status_modules_right 'directory session date_time'
set -g @catppuccin_date_time_text '%H:%M'

# ── Theme Flavor Switcher ────────────────────────────────────────
# prefix + T to cycle Catppuccin flavors: mocha → latte → frappe → macchiato
bind T run-shell ' \
  current=$(tmux show-option -gqv @catppuccin_flavor); \
  case "$current" in \
    mocha) next="latte" ;; \
    latte) next="frappe" ;; \
    frappe) next="macchiato" ;; \
    *) next="mocha" ;; \
  esac; \
  tmux set -g @catppuccin_flavor "$next"; \
  tmux run-shell "~/.config/tmux/plugins/tmux/catppuccin.tmux"; \
  tmux display-message "Catppuccin: $next"; \
'

run '~/.config/tmux/plugins/tpm/tpm'

# Keep manual window names — must be after plugins (catppuccin enables auto-rename)
set-option -g allow-rename off
set-window-option -g automatic-rename off
